name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main", "reality/*"]
  workflow_dispatch: # Questo ci permette di lanciarlo a mano se serve

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - name: Set Reality Environment
        run: |
          # Forziamo tutto in minuscolo per evitare errori DNS/URL
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "BASE_URL=https://${OWNER}.github.io/${REPO}/" >> $GITHUB_ENV
            echo "REALITY_ID=AXIS-PRIME" >> $GITHUB_ENV
            echo "PUBLISH_DIR=public" >> $GITHUB_ENV
          else
            # Sostituiamo / con - nel nome del branch per l'URL (es. reality/test -> reality-test)
            SLUG=$(echo "${{ github.ref_name }}" | sed 's/\//-/g')
            echo "BASE_URL=https://${OWNER}.github.io/${REPO}/${SLUG}/" >> $GITHUB_ENV
            echo "REALITY_ID=AXIS-${SLUG^^}" >> $GITHUB_ENV
            echo "PUBLISH_DIR=public/${SLUG}" >> $GITHUB_ENV
          fi
      - name: Build
        env:
          HUGO_PARAMS_REALITYID: ${{ env.REALITY_ID }}
        run: hugo --minify --baseURL "${{ env.BASE_URL }}" -d "${{ env.PUBLISH_DIR }}"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4