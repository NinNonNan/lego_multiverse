name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main", "reality/*"]
  workflow_dispatch: # Questo ci permette di lanciarlo a mano se serve

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
      - name: Set Reality Identity
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "HUGO_PARAMS_REALITYID=AXIS-PRIME" >> $GITHUB_ENV
          else
            echo "HUGO_PARAMS_REALITYID=AXIS-${{ github.ref_name }}" >> $GITHUB_ENV
          fi
      - name: Determine Destination
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "BASE_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_ENV
            echo "PUBLISH_DIR=public" >> $GITHUB_ENV
          else
            echo "BASE_URL=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ github.ref_name }}/" >> $GITHUB_ENV
            echo "PUBLISH_DIR=public/${{ github.ref_name }}" >> $GITHUB_ENV
          fi
      - name: Build
        run: hugo --minify --baseURL "${{ env.BASE_URL }}" -d "${{ env.PUBLISH_DIR }}"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4