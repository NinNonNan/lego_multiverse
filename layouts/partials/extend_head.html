<style>
    /* Personalizzazione per adattarlo allo stile RPG del blog */
    #cc-main {
        --cc-bg: #fff; /* O var(--theme) se hai un tema dark/light */
        --cc-primary-color: #2d4156;
        --cc-secondary-color: #555;
        
        /* Usa il colore 'secondary' del tuo blog per il bottone principale */
        --cc-btn-primary-bg: #333; 
        --cc-btn-primary-hover-bg: #000;
        
        /* Stile dei bordi simile al widget meteo */
        --cc-modal-border-radius: 0px; 
        --cc-btn-border-radius: 4px;
    }

    /* Se il tuo blog ha un tema scuro, puoi usare le media query */
    @media (prefers-color-scheme: dark) {
        #cc-main { --cc-bg: #1a1a1a; --cc-primary-color: #eee; }
    }
</style>
