<!-- Cookie Consent -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@v3.0.1/dist/cookieconsent.css">
<script src="https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@v3.0.1/dist/cookieconsent.umd.js"></script>

<script>
    CookieConsent.run({
        // ... (la tua configurazione attuale va bene, assicurati solo che sia dentro .run) ...
        categories: {
            necessary: { readOnly: true },
            analytics: { enabled: false, readOnly: false } // Imposta a false inizialmente
        },
        onConsent: () => {
            // Logica per attivare GTM dopo il consenso
            console.log('Consenso aggiornato');
            window.dataLayer = window.dataLayer || [];
            window.dataLayer.push({'event': 'consent_update'});
        }
    });
</script>
<!-- End Cookie Consent -->
