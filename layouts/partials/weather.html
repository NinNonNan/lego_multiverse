<div class="weather-rpg" id="weather-rpg" style="display: block; max-width: var(--main-width); margin: 20px auto 10px auto; padding: 10px var(--gap); border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border);">
    <div style="display: flex; align-items: center; gap: 20px;">
        <span id="w-icon" style="font-size: 3.5em; line-height: 1;">🌍</span>        
        <div style="line-height: 1.4;">
            <div id="w-fase" style="font-weight: 900; text-transform: uppercase; font-size: 1.2em; color: var(--secondary); letter-spacing: 1px;">
                CARICAMENTO...
            </div>          
            <div id="w-desc" style="font-size: 1.1em; opacity: 0.9; font-style: italic;">
                Sincronizzazione oracolo in corso...
            </div>
        </div>
    </div>
</div>

<script>
    async function updateWeather() {
        try {
            const res = await fetch('https://meteo-therpggame.antonino-ragusa-er.workers.dev/'); // <--- METTI IL TUO URL QUI
            const d = await res.json();
            
            const icons = { "Sole forte": "☀️", "Cielo velato": "⛅", "Nebbia": "🌫️", "Pioggia": "🌧️", "Neve": "❄️", "Tempesta": "⛈️" };
            
            document.getElementById('w-icon').innerText = icons[d.meteo] || "🌍";
            document.getElementById('w-fase').innerText = d.fase;
            document.getElementById('w-desc').innerText = `${d.meteo} • ${d.temperatura} • Magia ${d.condizione_magica}`;
            document.getElementById('weather-rpg').style.display = 'block';

            // Ripristina lo spostamento sotto l'header (titolo del blog)
            const header = document.querySelector('header.header');
            if (header) {
                header.after(document.getElementById('weather-rpg'));
            }
        } catch (e) { console.error("Meteo RPG offline"); }
    }
    updateWeather();
</script>
