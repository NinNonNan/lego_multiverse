{{ partial "weather.html" . }}

<span id="cc-footer-link" style="display: none;">
    <span style="opacity: 0.5; margin: 0 5px;">·</span>
    <button type="button" onclick="CookieConsent.showPreferences()" style="background: none; border: none; text-decoration: underline; color: var(--secondary); cursor: pointer; font-size: inherit; font-family: inherit; padding: 0;">Preferenze Cookie</button>
</span>

<script>
    (function() {
        var footer = document.querySelector('footer.footer');
        var link = document.getElementById('cc-footer-link');
        if (footer && link) {
            footer.appendChild(link);
            link.style.display = 'inline';
        }
    })();
</script>
